<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="description" content="AETHER — Developer Identity & Collaboration Platform" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>AETHER</title>
  <link rel="manifest" href="/public/manifest.json" />
  <link rel="stylesheet" href="/src/styles/variables.css" />
  <link rel="stylesheet" href="/src/styles/base.css" />
  <link rel="stylesheet" href="/src/styles/glass.css" />
  <link rel="stylesheet" href="/src/styles/bento.css" />
  <link rel="stylesheet" href="/src/styles/layout.css" />
  <link rel="stylesheet" href="/src/styles/animations.css" />
  <link rel="stylesheet" href="/src/styles/themes.css" />
  <link rel="stylesheet" href="/src/styles/main.css" />
  <style>
    #app-loading {
      position: fixed; inset: 0; background: var(--bg-primary);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.5s ease;
    }
    #app-loading.hidden { opacity: 0; pointer-events: none; }
    .loading-logo {
      font-size: 3rem; font-weight: 800; letter-spacing: -2px;
      background: var(--gradient-primary); -webkit-background-clip: text;
      -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 1.5rem;
    }
    .loading-spinner {
      width: 40px; height: 40px; border: 3px solid rgba(124,58,237,0.2);
      border-top-color: var(--accent-purple); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app-loading">
    <div class="loading-logo">AETHER</div>
    <div class="loading-spinner"></div>
  </div>

  <div id="app-root">
    <div id="layout-sidebar"></div>
    <div id="layout-main">
      <div id="layout-topbar"></div>
      <main id="page-content" class="page-transition"></main>
    </div>
    <div id="layout-bottomnav"></div>
  </div>

  <div id="modal-container"></div>
  <div id="toast-container"></div>

  <script type="module" src="/src/core/app.js"></script>
</body>
</html>
